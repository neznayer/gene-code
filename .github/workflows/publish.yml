name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the Version Packages PR + tags
  pull-requests: write # open/update the Version Packages PR
  id-token: write # OIDC / npm Trusted Publishers + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # OIDC Trusted Publishing needs npm >= 11.5.1 and Node >= 22.14.0,
      # and the upload must be done by npm (bun publish has no OIDC support).
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # If changesets exist, opens/updates a "Version Packages" PR.
      # When that PR is merged (versions bumped, no changesets left),
      # `publish` runs changeset publish, which uploads via npm (below).
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
