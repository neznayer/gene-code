name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the Version Packages PR + tags
  pull-requests: write # open/update the Version Packages PR
  id-token: write # OIDC / npm Trusted Publishers + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # If changesets exist, opens/updates a "Version Packages" PR.
      # When that PR is merged (versions bumped, no changesets left),
      # `publish` runs `changeset publish` to publish changed packages.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
