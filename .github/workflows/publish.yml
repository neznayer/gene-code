name: Publish to npm

on:
  release:
    types: [published]

# Required for OIDC / Trusted Publishers authentication
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # core must publish first so rehype's dependency resolves.
      # prepublishOnly builds dist/ automatically. Skip if this exact
      # version is already on npm, so releasing one package doesn't fail
      # on the other's unchanged version.
      - name: Publish @gene-code/core
        working-directory: packages/core
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if [ -n "$(npm view "$NAME@$VERSION" version 2>/dev/null)" ]; then
            echo "$NAME@$VERSION already published, skipping."
          else
            bunx npm publish --provenance --access public
          fi

      # npm cannot rewrite workspace:*, so pin the real core version first.
      - name: Publish @gene-code/rehype
        working-directory: packages/rehype
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if [ -n "$(npm view "$NAME@$VERSION" version 2>/dev/null)" ]; then
            echo "$NAME@$VERSION already published, skipping."
          else
            npm pkg set "dependencies.@gene-code/core=^$(node -p "require('../core/package.json').version")"
            bunx npm publish --provenance --access public
          fi
